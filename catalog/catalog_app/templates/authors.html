<!DOCTYPE html>
<html>
<head>
    <title>Авторы - Каталог курсов</title>
</head>
<body>
    <h1>Авторы курсов</h1>
    
    <ul>
        <li><a href="/">Главная</a></li>
        <li><a href="/courses/">Курсы</a></li>
        <li><a href="/authors/">Авторы</a></li>
        <li><a href="/info/">Информация</a></li>
    </ul>
    
    <p>Всего авторов: {{ authors|length }}</p>
    
    <ul>
        {% for author in authors %}
        <li>
            <h3>{{ author.name }}</h3>
            <p>{{ author.bio }}</p>
            <p>Email: {{ author.email }}</p>
            <a href="/authors/{{ author.id }}/">Подробнее об авторе</a>
            <hr>
        </li>
        {% endfor %}
    </ul>
</body>
</html>
