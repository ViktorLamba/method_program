<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}ЛР5{% endblock %}</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
        nav { display: flex; gap: 1rem; margin-bottom: 1.5rem; }
        .card { border: 1px solid #ddd; border-radius: 8px; padding: 1rem; }
        .errorlist { color: #b00020; }
        input { margin: .25rem 0 1rem; padding: .45rem; width: 100%; max-width: 420px; }
        button { padding: .5rem .9rem; }
    </style>
</head>
<body>
    <nav>
        <a href="{% url 'home' %}">Главная</a>
        {% if user.is_authenticated %}
            <span>Привет, {{ user.username }}!</span>
            <a href="{% url 'logout' %}">Выйти</a>
            <a href="{% url 'password_change' %}">Сменить пароль</a>
        {% else %}
            <a href="{% url 'login' %}">Войти</a>
            <a href="{% url 'register' %}">Регистрация</a>
        {% endif %}
    </nav>
    <div class="card">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
