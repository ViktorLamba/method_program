<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Lab 6{% endblock %}</title>
</head>
<body>
<nav>
    <a href="{% url 'home' %}">Главная</a>
    {% if user.is_authenticated %}
        <a href="{% url 'profile_me' %}">Мой профиль</a>
        <a href="{% url 'users_list' %}">Пользователи</a>
        <a href="{% url 'edit_profile' %}">Редактировать профиль</a>
        <a href="{% url 'private_page' %}">Приватная страница</a>
        <a href="{% url 'reports_page' %}">Отчеты</a>
        <a href="{% url 'logout' %}">Выйти</a>
    {% else %}
        <a href="{% url 'login' %}">Войти</a>
        <a href="{% url 'register' %}">Регистрация</a>
    {% endif %}
</nav>
<hr>
{% block content %}{% endblock %}
</body>
</html>
